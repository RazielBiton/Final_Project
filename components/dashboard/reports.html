<!-- 4. REPORTS SECTION -->
<div id="reports-section" class="dashboard-section d-none">



    <div class="db-flex-between db-mb-3 mb-4">
        <h4 class="m-0 fw-bold">דוחות וקנסות</h4>
        <button class="db-btn btn-warning-custom fw-bold shadow-sm rounded-pill px-4 py-2 border-0"
            onclick="openAddReportModal()">
            <i class="fas fa-plus me-2"></i> הוסף דוח ידני
        </button>
    </div>

    <!-- Empty State -->
    <div id="reports-empty-state" class="alert alert-info border-0 shadow-sm"
        style="background-color: #cff4fc; color: #055160; padding: 1rem; border-radius: 0.25rem;">
        <i class="fas fa-info-circle me-2"></i> אין דוחות פתוחים או היסטוריים להצגה. סע בזהירות!
    </div>

    <!-- Populated State -->
    <div id="reports-populated-state" class="d-none">
        <!-- Mandatory Courses Alerts Container -->
        <div id="mandatory-courses-container" class="mb-3 d-none">
            <!-- JS Injected -->
        </div>

        <!-- Top Summary Widgets -->
        <div class="row mb-4">
            <!-- Total Debt -->
            <div class="col-md-6 mb-3 mb-md-0">
                <div class="card shadow-sm border-0 h-100" style="border-radius: 12px;">
                    <div class="card-body d-flex align-items-center p-4">
                        <div class="icon-lg-wrapper me-4" style="background-color: #fff3cd; color: #ffc107;">
                            <i class="fas fa-shekel-sign fa-xl"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1 fw-bold">סה"כ לתשלום (פעילים)</h6>
                            <h3 class="m-0 fw-bold text-dark" id="total-amount">₪ 0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Traffic Points Gauge -->
            <div class="col-md-6">
                <div class="card shadow-sm border-0 h-100" style="border-radius: 12px;">
                    <div class="card-body d-flex align-items-center p-4">
                        <div class="icon-lg-wrapper me-4" style="background-color: #d1e7dd; color: #198754;"
                            id="points-icon-wrapper">
                            <i class="fas fa-tachometer-alt fa-xl" id="points-icon"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1 fw-bold">נקודות תעבורה (פעילים)</h6>
                            <h3 class="m-0 fw-bold text-success" id="total-points">0 <span
                                    class="fs-6 text-muted fw-normal">/ 35</span>
                            </h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Reports List -->
        <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
            <h5 class="m-0 fw-bold"><i class="fas fa-list-ul me-2 text-muted"></i> היסטוריית דוחות</h5>
        </div>

        <!-- Container for dynamically added reports -->
        <div id="reports-list-container"></div>

    </div>
</div>

<!-- Add Report Modal -->
<div class="modal fade" id="addReportModal" tabindex="-1" aria-labelledby="addReportModalLabel" aria-hidden="true"
    dir="rtl">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg my-4" style="border-radius: 16px; max-height: 90vh;">
            <div class="modal-header border-bottom-0 pb-0 pt-4 px-4 position-relative">
                <h5 class="modal-title fw-bold fs-4 text-dark">הוסף דוח חדש</h5>
                <button type="button" class="btn-close m-0" data-bs-dismiss="modal" aria-label="Close"
                    style="position: absolute; left: 15px; top: 15px; z-index: 10;"></button>
            </div>
            <div class="modal-body p-4">
                <form id="add-report-form" onsubmit="saveReport(event)">
                    <input type="hidden" id="reportIdField">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold mb-1">סוג עבירה</label>
                        <select id="report-type-select" class="form-select rounded-3 py-2 shadow-sm border-0 bg-light"
                            style="cursor: pointer;" onchange="toggleCustomType(this.value)" required>
                            <option value="" selected disabled>בחר סוג עבירה...</option>
                            <option value="parking">חניה</option>
                            <option value="speeding">מהירות</option>
                            <option value="phone">טלפון</option>
                            <option value="other">אחר</option>
                        </select>
                    </div>

                    <!-- Custom input when "other" is selected -->
                    <div class="mb-3" id="custom-type-container" style="display: none;">
                        <label class="form-label text-muted small fw-bold mb-1">פרט סוג עבירה</label>
                        <input type="text" id="report-type-custom"
                            class="form-control rounded-3 py-2 shadow-sm border-0 bg-light"
                            placeholder="הכנס תיאור עבירה...">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold mb-1">תאריך העבירה</label>
                            <input type="date" id="report-date"
                                class="form-control rounded-3 py-2 shadow-sm border-0 bg-light" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold mb-1">תאריך אחרון לתשלום</label>
                            <input type="date" id="report-due-date"
                                class="form-control rounded-3 py-2 shadow-sm border-0 bg-light" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold mb-1">מיקום העבירה</label>
                        <input type="text" id="report-location"
                            class="form-control rounded-3 py-2 shadow-sm border-0 bg-light"
                            placeholder='לדוגמה: כביש 4, ק"מ 12' required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold mb-1">סכום הדוח (₪)</label>
                            <input type="number" id="report-amount-input"
                                class="form-control rounded-3 py-2 shadow-sm border-0 bg-light" placeholder="0" min="0"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold mb-1">מספר נקודות</label>
                            <input type="number" id="report-points-input"
                                class="form-control rounded-3 py-2 shadow-sm border-0 bg-light" min="0" max="10"
                                placeholder="0" required>
                        </div>
                    </div>

                    <div class="mb-4 mt-2">
                        <label class="form-label text-muted small fw-bold mb-1">צילום הדוח</label>
                        <div id="reportUploadPlaceholder" class="upload-area rounded-3 p-4 text-center bg-light"
                            onclick="document.getElementById('reportImageInput').click()">
                            <i class="fas fa-cloud-upload-alt fa-2x text-primary-custom mb-2"></i>
                            <h6 class="mb-1 fw-bold text-dark">לחץ או גרור קובץ לכאן</h6>
                            <small class="text-muted">ניתן להעלות מספר תמונות</small>
                        </div>
                        <input type="file" id="reportImageInput" class="d-none" multiple accept="image/*">

                        <!-- Images Preview Container -->
                        <div id="reportImagesPreviewContainer"
                            class="d-none mt-3 p-3 bg-white rounded border shadow-sm">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-secondary small fw-bold"><i class="fas fa-images me-1"></i>תמונות
                                    שהועלו</span>
                                <button type="button" class="btn btn-sm btn-outline-danger py-0 px-2 rounded-pill"
                                    onclick="clearReportImages()" style="font-size: 0.75rem;">
                                    נקה הכל
                                </button>
                            </div>
                            <!-- Flex wrap container for thumbnails -->
                            <div id="reportImagesList" class="d-flex flex-wrap gap-2"></div>

                            <button type="button" class="btn btn-sm btn-outline-primary d-block w-100 mt-2 dashed-btn"
                                onclick="document.getElementById('reportImageInput').click()">
                                <i class="fas fa-plus me-1"></i> הוסף תמונות נוספות
                            </button>
                        </div>
                    </div>

                    <button type="submit"
                        class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm bg-primary-custom border-0 fs-6 mt-2">
                        שמור דוח
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

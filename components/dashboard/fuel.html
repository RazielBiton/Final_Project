<!-- 5. FUEL SECTION -->
<div id="fuel-section" class="dashboard-section d-none">
    <div class="db-flex-between db-mb-3">
        <h4 class="m-0">תיעוד תדלוקים</h4>
        <button id="addFuelBtn" class="db-btn db-btn-primary" onclick="openAddFuelModal()">
            <i class="fas fa-gas-pump me-2"></i> הוסף תדלוק
        </button>
    </div>

    <!-- Fuel KPI Cards -->
    <div class="row g-3 db-mb-5" id="fuel-kpi-cards" style="margin-bottom: 2rem;">
        <!-- Total Refuels Card -->
        <div class="col-md-4">
            <div
                class="db-card fuel-stats-card gradient-primary text-white h-100 p-3 d-flex flex-column align-items-center justify-content-center text-center">
                <div class="fuel-stats-icon mb-2">
                    <i class="fas fa-gas-pump fa-2x opacity-75"></i>
                </div>
                <div>
                    <h6 class="text-uppercase mb-1 opacity-75 fw-medium"
                        style="font-size: 0.8rem; letter-spacing: 0.5px;">הזנות אנרגיה (סה״כ)</h6>
                    <h2 class="m-0 fw-bold" id="fuel-total-count" style="font-size: 1.8rem;">0</h2>
                </div>
            </div>
        </div>
        <!-- Total Cost Card -->
        <div class="col-md-4">
            <div
                class="db-card fuel-stats-card gradient-success text-white h-100 p-3 d-flex flex-column align-items-center justify-content-center text-center">
                <div class="fuel-stats-icon mb-2">
                    <i class="fas fa-shekel-sign fa-2x opacity-75"></i>
                </div>
                <div>
                    <h6 class="text-uppercase mb-1 opacity-75 fw-medium"
                        style="font-size: 0.8rem; letter-spacing: 0.5px;">הוצאות אנרגיה (מצטבר)</h6>
                    <h2 class="m-0 fw-bold" id="fuel-total-cost" style="font-size: 1.8rem;">₪0</h2>
                </div>
            </div>
        </div>
        <!-- Live Prices Card -->
        <div class="col-md-4">
            <div class="db-card fuel-stats-card bg-white h-100 p-3 d-flex flex-column justify-content-center w-100"
                style="border-right: 4px solid #f6c23e;">
                <h6 class="text-uppercase text-muted mb-3 text-center fw-bold"
                    style="font-size: 0.85rem; letter-spacing: 0.5px;">
                    <i class="fas fa-bolt text-warning me-1"></i> מחירי אנרגיה בישראל כעת
                </h6>
                <div class="d-flex justify-content-between align-items-center mb-2 text-sm pb-1 border-bottom">
                    <span class="text-dark fw-bold" style="font-size: 0.85rem;">בנזין 95</span>
                    <span class="fw-bold text-primary" style="font-size: 0.95rem;"><span id="price-fuel-95"><i
                                class="fas fa-spinner fa-spin text-muted"></i></span> ₪</span>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-2 text-sm pb-1 border-bottom">
                    <span class="text-dark fw-bold" style="font-size: 0.85rem;">בנזין 98</span>
                    <span class="fw-bold text-muted" style="font-size: 0.95rem;"><span id="price-fuel-98"><i
                                class="fas fa-spinner fa-spin text-muted"></i></span> ₪</span>
                </div>
                <div class="d-flex justify-content-between align-items-center text-sm">
                    <span class="text-dark fw-bold" style="font-size: 0.85rem;">חשמל (קוט״ש)</span>
                    <span class="fw-bold text-success" style="font-size: 0.95rem;"><span id="price-elec"><i
                                class="fas fa-spinner fa-spin text-muted"></i></span> ₪</span>
                </div>
            </div>
        </div>
    </div>

    <!-- EV Message Area (Hidden by default) -->
    <div id="evFuelMessage" class="db-card p-4 text-center text-muted mb-4 d-none" style="background-color: #e9ecef;">
        <i class="fas fa-charging-station fa-3x mb-3 text-success"></i>
        <h5 class="text-success">רכב חשמלי</h5>
        <p>רכב זה מונע בחשמל (100%), ולכן אין צורך במעקב אחר תדלוקים. נתוני צריכת החשמל יכולים להיות מנוהלים בחלק
            ההוצאות במידת הצורך.</p>
    </div>

    <!-- Fuel History Container -->
    <div id="fuelHistoryContainer" class="db-card p-0">
        <div id="fuel-list" class="db-list-group db-list-group-flush">
            <!-- Populated securely via JavaScript -->
        </div>
    </div>
</div>
